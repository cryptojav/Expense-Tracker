<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <span class="brand-badge">
            Finance Pulse
        </span>

        <h1>
            Expense Tracker
        </h1>

        <p>
            Track every rupee with a bold, modern look.
        </p>

    </header>

    <main>

        <!-- ================= SUMMARY ================= -->

        <section class="summary">

            <div class="card">

                <h3>Balance</h3>

                <p id="balance">
                    Rs. 0
                </p>

            </div>

            <div class="card">

                <h3>Income</h3>

                <p id="income">
                    Rs. 0
                </p>

            </div>

            <div class="card">

                <h3>Expense</h3>

                <p id="expense">
                    Rs. 0
                </p>

            </div>

        </section>

        <!-- ================= TRANSACTION FORM ================= -->

        <section class="transaction-form">

            <h2>
                Add Transaction
            </h2>

            <!-- Amount -->

            <input
                type="number"
                id="amount"
                placeholder="Enter Amount">

            <!-- Type -->

            <select id="type">

                <option value="Income">
                    Income
                </option>

                <option value="Expense">
                    Expense
                </option>

            </select>

            <!-- Category -->

            <input
                type="text"
                id="category"
                placeholder="Enter Category">

            <!-- Date -->

            <input
                type="date"
                id="date">

            <!-- Note -->

            <textarea
                id="note"
                placeholder="Write a Note"></textarea>

            <!-- Status -->

            <p
                id="statusMessage"
                class="status-message">
            </p>

            <!-- Add Button -->

            <button id="addBtn">

                Add Transaction

            </button>

            <!-- Cancel Edit Button -->

            <button
                id="cancelEditBtn"
                style="display:none;">

                Cancel Edit

            </button>

        </section>

        <!-- ================= TRANSACTIONS ================= -->

        <section class="transactions">

            <h2>
                Transactions
            </h2>

            <!-- Search Box -->

            <div class="search-box">

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by Category or Note...">

            </div>

            <!-- Transaction List -->

            <div id="transactionList">

                <div class="empty-state">

                    No Transactions Yet

                </div>

            </div>

        </section>

        <!-- ================= ANALYTICS ================= -->

        <section class="charts">

            <h2>
                Analytics
            </h2>

            <div class="chart-box">

                Expense by Category

            </div>

            <div class="chart-box">

                Monthly Expenses

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
