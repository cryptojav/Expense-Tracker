<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <span class="brand-badge">
            Finance Pulse
        </span>

        <h1>
            Expense Tracker
        </h1>

        <p>
            Track every rupee with a bold, modern look.
        </p>

    </header>

    <main>

        <!-- ================= SUMMARY ================= -->

        <section class="summary">

            <div class="card">

                <h3>Balance</h3>

                <p id="balance">

                    Rs. 0

                </p>

            </div>

            <div class="card">

                <h3>Income</h3>

                <p id="income">

                    Rs. 0

                </p>

            </div>

            <div class="card">

                <h3>Expense</h3>

                <p id="expense">

                    Rs. 0

                </p>

            </div>

        </section>

        <!-- ================= FORM ================= -->

        <section class="transaction-form">

            <h2>Add Transaction</h2>

            <input
                type="number"
                id="amount"
                placeholder="Enter Amount">

            <select id="type">

                <option value="Income">Income</option>

                <option value="Expense">Expense</option>

            </select>

            <input
                type="text"
                id="category"
                placeholder="Enter Category">

            <input
                type="date"
                id="date">

            <textarea
                id="note"
                placeholder="Write a Note"></textarea>

            <p
                id="statusMessage"
                class="status-message">
            </p>

            <button id="addBtn">

                Add Transaction

            </button>

            <button
                id="cancelEditBtn"
                style="display:none;">

                Cancel Edit

            </button>

        </section>

        <!-- ================= TRANSACTIONS ================= -->

        <section class="transactions">

            <h2>

                Transactions

            </h2>

            <!-- SEARCH -->

            <div class="search-box">

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by Category or Note...">

            </div>

            <!-- FILTERS -->

            <div class="filters">

                <!-- TYPE FILTER -->

                <div class="filter-group">

                    <label class="filter-title">

                        Transaction Type

                    </label>

                    <select id="filterType">

                        <option value="All">

                            All

                        </option>

                        <option value="Income">

                            Income

                        </option>

                        <option value="Expense">

                            Expense

                        </option>

                    </select>

                </div>

                <!-- CATEGORY FILTER -->

                <div class="filter-group">

                    <label class="filter-title">

                        Category

                    </label>

                    <select id="filterCategory">

                        <option value="All">

                            All Categories

                        </option>

                        <option value="Food">

                            Food

                        </option>

                        <option value="Shopping">

                            Shopping

                        </option>

                        <option value="Transport">

                            Transport

                        </option>

                        <option value="Salary">

                            Salary

                        </option>

                        <option value="Bills">

                            Bills

                        </option>

                        <option value="Entertainment">

                            Entertainment

                        </option>

                        <option value="Health">

                            Health

                        </option>

                        <option value="Education">

                            Education

                        </option>

                        <option value="Others">

                            Others

                        </option>

                    </select>

                </div>

            </div>

            <!-- TRANSACTION LIST -->

            <div id="transactionList">

                <div class="empty-state">

                    No Transactions Yet

                </div>

            </div>

        </section>

        <!-- ================= ANALYTICS ================= -->

        <section class="charts">

            <h2>

                Analytics

            </h2>

            <div class="chart-box">

                Expense by Category

            </div>

            <div class="chart-box">

                Monthly Expenses

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
